name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-windows:
    # Pin the compiler image. windows-latest moved to a VS 2026 preview image
    # whose SDK/toolset combination currently fails in the Windows headers.
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure
        shell: powershell
        run: .\configure.cmd Release

      - name: Build
        shell: powershell
        run: .\build.cmd

      - name: Test
        shell: powershell
        run: .\test.cmd

      - name: Verify Artifacts
        shell: powershell
        run: |
          $required = @(
            "build/bin/engine/engine.dll",
            "build/bin/studio/engine_studio.exe",
            "build/bin/apps/pong/PongPreview.exe",
            "build/bin/apps/pong/pong_runtime.dll",
            "build/bin/tools/hotbuild/HotBuildTool.exe"
          )
          foreach ($path in $required) {
            if (!(Test-Path $path)) {
              throw "Missing expected artifact: $path"
            }
          }

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs
          path: logs/*.log
          if-no-files-found: ignore
