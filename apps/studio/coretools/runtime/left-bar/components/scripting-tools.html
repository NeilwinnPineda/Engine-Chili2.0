<section class="tool-component" data-tool-component="scripting-tools" aria-label="Scripting tools">
    <div class="tool-grid tool-grid--scripting" role="list" aria-label="Scripting tools">
        <!-- Script: create, open, or attach a script to the selected object -->
        <button class="tool-tile" type="button" role="listitem" title="Script" aria-label="Script">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-code-2">
                    <path d="M4 22h14a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v4" />
                    <path d="M14 2v4a2 2 0 0 0 2 2h4" />
                    <path d="m5 12-3 3 3 3" />
                    <path d="m9 18 3-3-3-3" />
                </svg></span>
        </button>

        <!-- Event: add engine or object hooks such as start, update, click, or collision -->
        <button class="tool-tile" type="button" role="listitem" title="Event" aria-label="Event">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-radio-tower">
                    <path d="M4.9 16.1C3 14.2 2 11.7 2 9s1-5.2 2.9-7.1" />
                    <path d="M7.8 13.2C6.7 12.1 6 10.6 6 9s.7-3.1 1.8-4.2" />
                    <path d="M16.2 4.8C17.3 5.9 18 7.4 18 9s-.7 3.1-1.8 4.2" />
                    <path d="M19.1 1.9C21 3.8 22 6.3 22 9s-1 5.2-2.9 7.1" />
                    <path d="M9.5 18h5" />
                    <path d="m8 22 4-11 4 11" />
                </svg></span>
        </button>

        <!-- Function: create reusable logic routines that scripts can call -->
        <button class="tool-tile" type="button" role="listitem" title="Function" aria-label="Function">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-braces">
                    <path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5a2 2 0 0 0 2 2h1" />
                    <path d="M16 21h1a2 2 0 0 0 2-2v-5a2 2 0 0 1 2-2 2 2 0 0 1-2-2V5a2 2 0 0 0-2-2h-1" />
                </svg></span>
        </button>

        <!-- Variable: add editable data/state values used by script logic -->
        <button class="tool-tile" type="button" role="listitem" title="Variable" aria-label="Variable">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-function">
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                    <path d="M9 17c2 0 2-10 4-10" />
                    <path d="M9 7h6" />
                    <path d="M11 12h4" />
                </svg></span>
        </button>

        <!-- Condition: add if/else branching and decision checks -->
        <button class="tool-tile" type="button" role="listitem" title="Condition" aria-label="Condition">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-git-branch">
                    <line x1="6" x2="6" y1="3" y2="15" />
                    <circle cx="18" cy="6" r="3" />
                    <circle cx="6" cy="18" r="3" />
                    <path d="M18 9a9 9 0 0 1-9 9" />
                </svg></span>
        </button>

        <!-- Loop: repeat logic using iteration patterns such as for, while, or foreach -->
        <button class="tool-tile" type="button" role="listitem" title="Loop" aria-label="Loop">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-repeat-2">
                    <path d="m2 9 3-3 3 3" />
                    <path d="M5 6h11a4 4 0 0 1 0 8H4" />
                    <path d="m22 15-3 3-3-3" />
                    <path d="M19 18H8a4 4 0 0 1 0-8h12" />
                </svg></span>
        </button>

        <!-- Signal: send or receive messages between objects, scripts, or systems -->
        <button class="tool-tile" type="button" role="listitem" title="Signal" aria-label="Signal">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send">
                    <path d="m22 2-7 20-4-9-9-4Z" />
                    <path d="M22 2 11 13" />
                </svg></span>
        </button>

        <!-- Bind: connect script logic to input, UI, object properties, or engine events -->
        <button class="tool-tile" type="button" role="listitem" title="Bind" aria-label="Bind">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-link-2">
                    <path d="M9 17H7A5 5 0 0 1 7 7h2" />
                    <path d="M15 7h2a5 5 0 0 1 0 10h-2" />
                    <line x1="8" x2="16" y1="12" y2="12" />
                </svg></span>
        </button>

        <!-- Timeline: sequence timed actions, delays, scripted beats, and triggers -->
        <button class="tool-tile" type="button" role="listitem" title="Timeline" aria-label="Timeline">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock-3">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16.5 12" />
                </svg></span>
        </button>

        <!-- Debug: inspect values, print logs, and trace script execution -->
        <button class="tool-tile" type="button" role="listitem" title="Debug" aria-label="Debug">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bug">
                    <path d="m8 2 1.88 1.88" />
                    <path d="M14.12 3.88 16 2" />
                    <path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1" />
                    <path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6" />
                    <path d="M12 20v-9" />
                    <path d="M6.53 9C4.6 8.8 3 7.1 3 5" />
                    <path d="M6 13H2" />
                    <path d="M3 21c0-2.1 1.7-3.8 3.8-4" />
                    <path d="M17.47 9C19.4 8.8 21 7.1 21 5" />
                    <path d="M18 13h4" />
                    <path d="M21 21c0-2.1-1.7-3.8-3.8-4" />
                </svg></span>
        </button>
    </div>
</section>
