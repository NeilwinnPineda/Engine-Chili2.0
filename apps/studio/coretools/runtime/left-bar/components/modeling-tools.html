<section class="tool-component" data-tool-component="modeling-tools" aria-label="Modeling tools">
    <div class="tool-grid tool-grid--modeling" role="list" aria-label="Modeling tools">
        <!-- Line: draw straight construction edges and simple profiles -->
        <button class="tool-tile" type="button" role="listitem" title="Line" aria-label="Line">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-slash">
                    <path d="M22 2 2 22" />
                </svg></span>
        </button>

        <!-- Arc: create curved edges for rounded profiles and construction paths -->
        <button class="tool-tile" type="button" role="listitem" title="Arc" aria-label="Arc">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rotate-ccw">
                    <path d="M3 12a9 9 0 1 0 9-9" />
                    <path d="M3 3v9h9" />
                </svg></span>
        </button>

        <!-- Rectangle: create rectangular faces and box-like base profiles -->
        <button class="tool-tile" type="button" role="listitem" title="Rectangle" aria-label="Rectangle">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rectangle-horizontal">
                    <rect width="20" height="12" x="2" y="6" rx="2" />
                </svg></span>
        </button>

        <!-- Circle: create circular profiles for holes, cylinders, and radial shapes -->
        <button class="tool-tile" type="button" role="listitem" title="Circle" aria-label="Circle">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle">
                    <circle cx="12" cy="12" r="10" />
                </svg></span>
        </button>

        <!-- Polygon: create multi-sided profiles with controlled edge counts -->
        <button class="tool-tile" type="button" role="listitem" title="Polygon" aria-label="Polygon">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-hexagon">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                </svg></span>
        </button>

        <!-- Primitive: add base 3D objects like cube, plane, cylinder, and sphere -->
        <button class="tool-tile" type="button" role="listitem" title="Primitive" aria-label="Primitive">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-box">
                    <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />
                    <path d="m3.3 7 8.7 5 8.7-5" />
                    <path d="M12 22V12" />
                </svg></span>
        </button>

        <!-- Extrude: pull faces or profiles into 3D volume -->
        <button class="tool-tile" type="button" role="listitem" title="Extrude" aria-label="Extrude">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-boxes">
                    <path d="M7.97 4.42A2 2 0 0 0 7 6.13v4.37l5 3 5-3V6.13a2 2 0 0 0-.97-1.71l-3-1.8a2 2 0 0 0-2.06 0z" />
                    <path d="M12 8 7.26 5.15" />
                    <path d="m12 8 4.74-2.85" />
                    <path d="M12 13.5V8" />
                    <path d="M12 13.5v5" />
                    <path d="m9 16.5 3 2 3-2" />
                </svg></span>
        </button>

        <!-- Inset: create an inner face boundary inside an existing face -->
        <button class="tool-tile" type="button" role="listitem" title="Inset" aria-label="Inset">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-dashed">
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                    <rect width="8" height="8" x="8" y="8" rx="1" />
                </svg></span>
        </button>

        <!-- Bevel: soften or chamfer selected edges -->
        <button class="tool-tile" type="button" role="listitem" title="Bevel" aria-label="Bevel">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-octagon">
                    <path d="M7.86 2h8.28L22 7.86v8.28L16.14 22H7.86L2 16.14V7.86z" />
                </svg></span>
        </button>

        <!-- Cut: draw cuts across faces or geometry to split surfaces -->
        <button class="tool-tile" type="button" role="listitem" title="Cut" aria-label="Cut">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-scissors">
                    <circle cx="6" cy="6" r="3" />
                    <path d="M8.12 8.12 12 12" />
                    <path d="M20 4 8.12 15.88" />
                    <circle cx="6" cy="18" r="3" />
                    <path d="M14.8 14.8 20 20" />
                </svg></span>
        </button>

        <!-- Loop Cut: add a controlled loop cut around connected topology -->
        <button class="tool-tile" type="button" role="listitem" title="Loop Cut" aria-label="Loop Cut">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-split-horizontal">
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                    <path d="M3 12h18" />
                    <path d="M12 3v18" />
                </svg></span>
        </button>

        <!-- Bridge: connect two open edges or faces with new geometry -->
        <button class="tool-tile" type="button" role="listitem" title="Bridge" aria-label="Bridge">
            <span class="tool-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-link">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                </svg></span>
        </button>
    </div>
</section>
